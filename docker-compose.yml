# docker-compose.yml (исправленная версия)
services:
  backend:
    build: ./backend
    container_name: pneumonia-backend
    ports:
      - "8000:8000"
    volumes:
      - ./backend/model:/app/model
      - ./backend/logs:/app/logs
    environment:
      - PYTHONUNBUFFERED=1
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - pneumonia-network

  frontend:
    build: ./frontend
    container_name: pneumonia-frontend
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - pneumonia-network

networks:
  pneumonia-network:
    driver: bridge